query JobberPaymentsCapitalLoan{
  capitalLoans(
     first: {{.First}}
     {{if .After}}
     after: "{{.After}}"
     {{end}}
     {{if or .FromDate .ToDate}}
     filter: {
       createdAt: {
         {{if .FromDate}}
         after: "{{.FromDate}}"
         {{end}}
         {{if .ToDate}}
         before: "{{.ToDate}}"
         {{end}}
       }
     }
     {{end}}
  ){
    nodes{
      acceptedAdvanceAmount
      acceptedFrom
      createdAt
      dismissedAt
      expiresAfter
      id
      initialOffer
      loanFeeAmount
      loanId
      offeredAdvanceAmount
      refill
      status
      updatedAt
    }
    pageInfo{
      endCursor
      hasNextPage
    }
    totalCount
  }
}