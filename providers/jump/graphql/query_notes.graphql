query Notes {
  notes(
    first: {{.First}}
    {{if .After}}
    after: "{{.After}}"
    {{end}}
    {{if .UpdatedAfter}}
    updatedAfter: "{{.UpdatedAfter}}"
    {{end}}
    {{if .UpdatedBefore}}
    updatedBefore: "{{.UpdatedBefore}}"
    {{end}}
  ) {
    items {
      id
      insertedAt
      meetingId
      note
      subject
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
