            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    description: list
                  page:
                    type: integer
                    description: page number of the paginated list
                  page_size:
                    type: integer
                    description: number of items per page
                  total_pages_count:
                    type: integer
                    description: number of pages of the whole document
                  total_count:
                    type: integer
                    description: total records count
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PricebookService'
                  url:
                    type: string
      operationId: get-price-book-services
      description: Get a list of price book services.
      security:
        - Application API Key: []
        - Housecall User OAuth Token: []
      parameters:
        - schema:
            type: number
            default: 1
          in: query
          name: page
          description: Current Page
        - schema:
            type: number
            default: 10
          in: query
          name: page_size
          description: Number of items returned per page.
        - schema:
            type: string
            default: created_at
          in: query
          name: sort_by
          description: Price book service attribute to sort by
        - schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          in: query
          name: sort_direction
          description: Ascending or descending
        - schema:
            type: string
          in: query
          name: q
          description: 'A query that can be used to search for a service by name, description and task_number.'
        - schema:
            type: array
            items:
              type: object
              properties:
                property:
                  type: string
                  enum:
                    - online_booking_enabled
                    - managed_by
                    - flat_rate_enabled
                    - taxable
                    - category
                    - organization_industry
                  description: Filter field name.
                operator:
                  type: string
                  enum:
                    - eq
                  description: Comparison operator.
                value:
                  oneOf:
                    - type: boolean
                    - type: string
                  description: 'Value to filter by (Boolean for flags, string for text fields).'
              required:
                - property
                - operator
                - value
          in: query
          name: filters
          style: deepObject
          explode: true
          description: |
            Deep-object filters sent as `filters[][property]`, `filters[][operator]`, and `filters[][value]`. Supported properties: `online_booking_enabled`, `managed_by`, `flat_rate_enabled`, `taxable`, `category`, `organization_industry`. Only the `eq` operator is supported. Each `filters[][value]` may be a boolean (`true`/`false`) or a string, depending on the property.
