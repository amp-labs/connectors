                    type: integer
  /pipeline/statuses:
    get:
      summary: Get Pipeline Statuses
      description: |
        Retrieves a list of pipeline statuses for a given resource type (lead, job, or estimate).
        Returns an empty array for organizations without pipeline enabled.
      tags:
        - Pipeline
      parameters:
        - name: resource_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - lead
              - job
              - estimate
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      statuses:
                        type: array
                        items:
                          $ref: '#/components/schemas/PipelineStatus'
              examples:
                with_pipeline:
                  summary: Organization with pipeline enabled
                  value:
                    page: 1
                    page_size: 10
                    total_pages: 2
                    total_items: 13
                    statuses:
                      - id: string
                        name: string
                        status_type: string
                without_pipeline:
                  summary: Organization without pipeline enabled
                  value:
                    page: 1
                    page_size: 10
                    total_pages: 0
                    total_items: 0
                    statuses: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    put:
      summary: Update Pipeline Status
      description: |
        Updates pipeline status for lead, job, or estimate.
        The Pipeline domain only allows forward movement to statuses with equal or higher order values.
      tags:
        - Pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineStatusUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_id:
                    type: string
                    description: The UUID of the updated status
                  resource_id:
                    type: string
                    description: 'The UUID of the resource (lead, job, or estimate)'
                  resource_type:
                    type: string
                    enum:
                      - lead
                      - job
                      - estimate
                  name:
                    type: string
                    description: The name of the pipeline status
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
