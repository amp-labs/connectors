            type: array
          in: query
          name: employee_ids
          description: Filters estimates by assigned pro id
        - schema:
            type: string
          in: query
          name: customer_id
          description: Filters estimates by a single customer ID (string)
        - schema:
            type: string
            default: '1'
          in: query
          name: page
          description: Paginated page number.
