                "$ref": "#/components/schemas/Error"
components:
  parameters:
    PageTokenParam:
      name: page_token
      in: query
      description: Opaque token for cursor-based pagination
      schema:
        type: string
    CreatedSinceParam:
      name: created_since
      in: query
      description: Filter results created on or after this time (ISO-8601 timestamp)
      schema:
        type: string
        format: date-time
    UpdatedSinceParam:
      name: updated_since
      in: query
      description: Filter results updated on or after this time (ISO-8601 timestamp)
      schema:
        type: string
        format: date-time
    IdsFilterParam:
      name: ids[]
      in: query
      description: Filter by resource IDs (max 50)
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          format: int64
        minItems: 1
        maxItems: 50
  schemas:
    address:
      type: object
      properties:
        street:
          type: string
          nullable: true
          description: Street address
          example: 123 Main St
        city:
          type: string
          nullable: true
          description: City
          example: San Francisco
        province:
          type: string
          nullable: true
          description: State or province
          example: CA
        postal_code:
          type: string
          nullable: true
          description: Postal or ZIP code
          example: '94102'
        country:
          type: string
          nullable: true
          description: Country
          example: USA
    contact:
      type: object
      required:
      - id
      - global_id
      - name
      - type
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the contact
          example: 123
        global_id:
          type: string
          description: Global ULID identifier for the contact
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        clio_id:
          type: integer
          format: int64
          nullable: true
          description: Clio Manage ID if synced
          example: 456
        name:
          type: string
          description: Full name of the contact
          example: John Doe
        first_name:
          type: string
          nullable: true
          description: First name (for Person type contacts)
          example: John
        last_name:
          type: string
          nullable: true
          description: Last name (for Person type contacts)
          example: Doe
        emails:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses
          example:
          - john@example.com
        phone_numbers:
          type: array
          items:
            type: string
          description: List of phone numbers
          example:
          - "+15551234567"
        type:
          type: string
          enum:
          - Person
          - Company
          description: Type of contact
          example: Person
        status:
          type: string
          nullable: true
          description: The status of the contact. Default values are Unassigned, Intake,
            Hired, Did Not Hire, but accounts can define custom statuses.
          example: Hired
        matters:
          type: array
          items:
            type: object
            required:
            - id
            properties:
              id:
                type: integer
                format: int64
                description: Unique identifier for the Matter
          description: The matters associated with the contact
        addresses:
          type: array
          items:
            "$ref": "#/components/schemas/address"
          description: List of addresses
        created_at:
          type: string
          format: date-time
          description: The time the contact was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the contact was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
    Paging:
      type: object
      properties:
        next:
          type: string
          format: uri
          nullable: true
          description: URL for the next page of results
          example: https://grow.clio.com/api/v2/contacts?page_token=abc123
        previous:
          type: string
          format: uri
          nullable: true
          description: URL for the previous page of results
    ListMeta:
      type: object
      required:
      - paging
      properties:
        paging:
          "$ref": "#/components/schemas/Paging"
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - status
          - message
          properties:
            status:
              type: string
              description: Error status code
            message:
              type: string
              description: Human-readable error message
    Note:
      type: object
      additionalProperties: false
      required:
      - id
      - subject
      - body
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the note
          example: 123
        subject:
          type: string
          maxLength: 255
          description: Subject line of the note
          example: API request
        body:
          type: string
          maxLength: 65535
          description: Body content of the note
          example: Making a matter note from the API
        created_at:
          type: string
          format: date-time
          description: The time the note was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the note was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
    user:
      type: object
      required:
      - id
      - email
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the user
          example: 123
        first_name:
          type: string
          nullable: true
          description: First name of the user
          example: Jane
        last_name:
          type: string
          nullable: true
          description: Last name of the user
          example: Doe
        email:
          type: string
          format: email
          description: Email address of the user
          example: jane.doe@example.com
        created_at:
          type: string
          format: date-time
          description: The time the user was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the user was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
        account:
          type: object
          description: The account the user belongs to
          required:
          - id
          - firm_name
          properties:
            id:
              type: integer
              format: int64
              description: Unique identifier for the account
              example: 456
            firm_name:
              type: string
              description: Name of the firm
              example: Doe & Associates
    client_summary:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the contact
          example: 123
        full_name:
          type: string
          description: Full name of the contact
          example: Jane Doe
        phone_number:
          type: string
          nullable: true
          description: Default phone number
          example: "+15551234567"
        primary_email:
          type: string
          format: email
          nullable: true
          description: Primary email address
          example: jane@example.com
        address:
          type: object
          nullable: true
          allOf:
          - "$ref": "#/components/schemas/address"
    matter:
      type: object
      required:
      - id
      - global_id
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the matter
          example: 789
        description:
          type: string
          nullable: true
          description: Description of the matter
          example: Personal injury case
        created_at:
          type: string
          format: date-time
          description: The time the matter was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the matter was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
        clio_id:
          type: integer
          format: int64
          nullable: true
          description: Clio Manage ID if synced
          example: 456
        global_id:
          type: string
          description: Global ULID identifier for the matter
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        projected_value:
          type: integer
          nullable: true
          description: Estimated monetary value of the matter (in cents). May be redacted.
          example: 500000
        first_letter_sent_date:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first letter sent for this matter. May be
            redacted.
          example: '2024-03-01T09:00:00Z'
        first_appointment_created_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first consultation created for this matter.
            May be redacted.
          example: '2024-02-15T14:00:00Z'
        inbox_lead_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the associated inbox lead. May be redacted.
          example: 321
        is_locked:
          type: boolean
          description: Whether the matter is locked. Locked matters are read-only.
          example: true
        hired_date:
          type: string
          format: date
          nullable: true
          description: The date the client was hired. May be redacted.
          example: '2024-04-01'
        location:
          type: string
          nullable: true
          description: Name of the office location associated with the matter
          example: Main Office
        type:
          type: string
          nullable: true
          description: Name of the matter type
          example: Personal Injury
        status:
          type: string
          nullable: true
          description: Current status of the matter
          example: Open
        status_category:
          type: string
          nullable: true
          description: Category of the matter status
          enum:
          - intake
          - hired
          - declined
        client:
          "$ref": "#/components/schemas/client_summary"
        primary_contact:
          nullable: true
          description: The primary contact associated with the matter. Use `client`
            for new integrations.
          allOf:
          - "$ref": "#/components/schemas/client_summary"
    CustomActionUIReference:
      type: string
      enum:
      - matters/show
      description: The UI reference of the custom action. Currently only "matters/show"
        is supported.
      example: matters/show
    custom_action:
      type: object
      required:
      - id
      - label
      - target_url
      - ui_reference
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the custom action
          example: 123
        label:
          type: string
          minLength: 6
          maxLength: 32
          description: The label of the custom action
          example: Send Email
        target_url:
          type: string
          format: uri
          pattern: "^https://.+"
          description: The target URL of the custom action
          example: https://www.clio.com/api/v2/custom_actions/123/execute
        ui_reference:
          "$ref": "#/components/schemas/CustomActionUIReference"
        created_at:
          type: string
          format: date-time
          description: The time the custom action was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the custom action was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
    inbox_lead:
      type: object
      additionalProperties: false
      required:
      - id
      - first_name
      - last_name
      - email
      - phone_number
      - state
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the inbox lead
          example: 123
        first_name:
          type: string
          nullable: true
          description: First name of the lead
          example: Jane
        last_name:
          type: string
          nullable: true
          description: Last name of the lead
          example: Smith
        email:
          type: string
          format: email
          nullable: true
          description: Email address of the lead
          example: jane@example.com
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead
          example: "+15551234567"
        state:
          type: string
          description: Current state of the lead
          example: untriaged
        created_at:
          type: string
          format: date-time
          description: The time the lead was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the lead was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
    inbox_lead_create_response:
      type: object
      additionalProperties: false
      required:
      - id
      - first_name
      - last_name
      - email
      - phone_number
      - state
      - created_at
      - updated_at
      - from_message
      - from_source
      - referring_url
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the inbox lead
          example: 123
        first_name:
          type: string
          nullable: true
          description: First name of the lead
          example: Jane
        last_name:
          type: string
          nullable: true
          description: Last name of the lead
          example: Smith
        email:
          type: string
          format: email
          nullable: true
          description: Email address of the lead
          example: jane@example.com
        phone_number:
          type: string
          nullable: true
          description: Phone number of the lead
          example: "+15551234567"
        state:
          type: string
          description: Current state of the lead
          example: untriaged
        created_at:
          type: string
          format: date-time
          description: The time the lead was created (ISO-8601 timestamp)
          example: '2024-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: The time the lead was last updated (ISO-8601 timestamp)
          example: '2024-02-20T14:45:00Z'
        from_message:
          type: string
          description: Message content from the lead
          example: I'm interested in your services
        from_source:
          type: string
          description: Source of the lead
          example: website_chat
        referring_url:
          type: string
          format: uri
          description: URL the lead came from
          example: https://example.com/contact
  responses:
    BadRequestResponse:
      description: Bad Request
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    TooManyRequestsResponse:
      description: Too Many Requests
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
    UnprocessableEntityResponse:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/Error"
