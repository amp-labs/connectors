  "/custom_actions":
    get:
      operationId: listCustomActions
      summary: List custom actions
      description: Returns a paginated list of custom actions
      tags:
      - Custom Actions
      parameters:
      - name: page_token
        in: query
        description: Opaque token for cursor-based pagination
        schema:
          type: string
      - name: created_since
        in: query
        description: Filter custom actions created on or after this time (ISO-8601
          timestamp)
        schema:
          type: string
          format: date-time
      - name: updated_since
        in: query
        description: Filter custom actions updated on or after this time (ISO-8601
          timestamp)
        schema:
          type: string
          format: date-time
      - name: ids[]
        in: query
        description: Filter by custom action IDs (max 50)
        schema:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 50
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/custom_action"
                  meta:
                    type: object
                    properties:
                      paging:
                        "$ref": "#/components/schemas/Paging"
        '400':
