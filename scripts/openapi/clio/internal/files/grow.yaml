      description: Creates a new inbox lead
      tags:
      - Inbox Leads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - data
              properties:
                data:
                  type: object
                  additionalProperties: false
                  required:
                  - first_name
                  - last_name
                  - from_message
                  - referring_url
                  - from_source
                  properties:
                    first_name:
                      type: string
                      description: First name of the lead
                      example: Jane
                    last_name:
                      type: string
                      description: Last name of the lead
                      example: Smith
                    from_message:
                      type: string
                      description: Message content from the lead
                      example: I'm interested in your services
                    referring_url:
                      type: string
                      format: uri
                      description: URL the lead came from
                      example: https://example.com/contact
                    from_source:
                      type: string
                      description: Source of the lead
                      example: website_chat
                    email:
                      type: string
                      format: email
                      description: Email address of the lead (optional)
                      example: jane@example.com
                    phone_number:
                      type: string
                      description: Phone number of the lead (optional)
                      example: "+15551234567"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - data
                properties:
                  data:
                    "$ref": "#/components/schemas/inbox_lead_create_response"
        '400':
