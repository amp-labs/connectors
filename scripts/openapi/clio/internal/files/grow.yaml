      summary: Create a custom action
      description: Creates a new custom action
      tags:
      - Custom Actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - data
              properties:
                data:
                  type: object
                  required:
                  - label
                  - target_url
                  - ui_reference
                  properties:
                    label:
                      type: string
                      minLength: 6
                      maxLength: 32
                      description: The label of the custom action
                      example: Send Email
                    target_url:
                      type: string
                      description: The target URL of the custom action
                      format: uri
                      pattern: "^https://.+"
                      example: https://www.clio.com/api/v2/custom_actions/123/execute
                    ui_reference:
                      "$ref": "#/components/schemas/CustomActionUIReference"
      responses:
        '201':
          description: Created
