info:
  title: Clio Grow API Documentation
  version: v2
  description: |
    # Developer Support and Feedback
    * Clio takes the availability and stability of our API seriously; please report any **degradations** or **breakages** to Clio Grow's API Support team at [api@clio.com](mailto:api@clio.com).
    * For business and partnership inquiries, contact our API Partnerships team at [api.partnerships@clio.com](mailto:api.partnerships@clio.com).
    * For best practices and tips from the Clio development community, join the conversation in the [Clio Developer Slack Channel](https://join.slack.com/t/clio-public/shared_invite/zt-36i0eqgo1-7POORPtMJpp2N0~_auL2IQ).

    # Getting Started
    > **Note:** The API is available at region specific URLs for the [Australia](https://au.api.clio.com/grow), [EU](https://eu.api.clio.com/grow), [Canada](https://ca.api.clio.com/grow) and [US](https://api.clio.com/grow) regions.
    >
    > The developer portal is available at region-specific links for the [Australia](https://au.developers.api.clio.com), [EU](https://eu.developers.api.clio.com), [Canada](https://ca.developers.api.clio.com) and [US](https://developers.api.clio.com) regions.
