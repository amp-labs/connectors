specVersion: 1.0.0
integrations:
  - name: readAndWriteGetResponse
    displayName: GetResponse read and write
    provider: getResponse

    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:

        - objectName: contacts
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getContactList
          requiredFields:
            - fieldName: contactId
            - fieldName: email
            - fieldName: name
          optionalFieldsAuto: all

        - objectName: campaigns
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getCampaignList
          requiredFields:
            - fieldName: campaignId
            - fieldName: name
          optionalFieldsAuto: all

        - objectName: newsletters
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getNewsletterList
          requiredFields:
            - fieldName: newsletterId
            - fieldName: name
          optionalFieldsAuto: all

        - objectName: autoresponders
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getAutoresponderList
          requiredFields:
            - fieldName: autoresponderId
            - fieldName: name
          optionalFieldsAuto: all

        # Forms require account/campaign permission; may 403 for collaborators or restricted accounts.
        # Uncomment if the connected account has form access.
        # - objectName: forms
        #   destination: getResponseWebhook
        #   schedule: "*/10 * * * *" # Every 10 minutes
        #   # New Forms API: https://apireference.getresponse.com/#operation/getFormList
        #   requiredFields:
        #     - fieldName: formId
        #     - fieldName: name
        #   optionalFieldsAuto: all

        - objectName: landing-pages
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getLpsList
          requiredFields:
            - fieldName: landingPageId
            - fieldName: name
          optionalFieldsAuto: all

        - objectName: custom-events
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getCustomEventsList
          requiredFields:
            - fieldName: customEventId
            - fieldName: name
          optionalFieldsAuto: all

        - objectName: webinars
          destination: getResponseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://apireference.getresponse.com/#operation/getWebinarsList
          requiredFields:
            - fieldName: webinarId
            - fieldName: name
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: contacts # https://apireference.getresponse.com/#operation/createContact
        - objectName: campaigns # https://apireference.getresponse.com/#operation/createCampaign

    proxy:
      enabled: true
